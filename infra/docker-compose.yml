# Single entry point for the whole system: `docker-compose up` from this
# directory brings up backing infra + (once later phases add them) every
# application service. Phase 0 wires only the backing infra so it can be
# validated in isolation before any app code depends on it.

services:
  mysql:
    image: mysql:8.0
    container_name: order-management-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orders
      MYSQL_USER: ordermgmt
      MYSQL_PASSWORD: ordermgmt
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: order-management-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: order-management-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      CLUSTER_ID: "OA0STjhxRmihZ1MxcLY6YQ"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 10s
      retries: 15

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: order-management-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.0.0
    container_name: order-management-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  # --- Application services -------------------------------------------
  # Each Dockerfile just copies a prebuilt boot jar (see README: run
  # `./gradlew build` once before `docker-compose up --build`), so these
  # images build in seconds and don't need network access to Maven Central
  # at container-build time.

  downstream-simulators:
    build:
      context: ../downstream-simulators
    image: order-management-local/downstream-simulators:latest
    container_name: order-management-downstream-simulators
    restart: unless-stopped
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  order-ingestion-service:
    build:
      context: ../order-ingestion-service
    image: order-management-local/order-ingestion-service:latest
    container_name: order-management-order-ingestion-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  order-pipeline-service:
    build:
      context: ../order-pipeline-service
    image: order-management-local/order-pipeline-service:latest
    container_name: order-management-order-pipeline-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ordermgmt
      MYSQL_PASSWORD: ordermgmt
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SIMULATORS_BASE_URL: http://downstream-simulators:8082
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      downstream-simulators:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  dashboard-service:
    build:
      context: ../dashboard-service
    image: order-management-local/dashboard-service:latest
    container_name: order-management-dashboard-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOAD_GENERATOR_BASE_URL: http://load-generator:8085
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  load-generator:
    build:
      context: ../load-generator
    image: order-management-local/load-generator:latest
    container_name: order-management-load-generator
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      INGESTION_BASE_URL: http://order-ingestion-service:8081
      LOAD_BASELINE_RATE: "0.0"
    depends_on:
      order-ingestion-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
  kafka-data:
