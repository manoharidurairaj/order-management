server:
  port: 8083

spring:
  application:
    name: order-pipeline-service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/orders?createDatabaseIfNotExist=true
    username: ${MYSQL_USER:ordermgmt}
    password: ${MYSQL_PASSWORD:ordermgmt}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: order-pipeline-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.ordermgmt.common.domain
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: true

ordermgmt:
  simulators:
    base-url: ${SIMULATORS_BASE_URL:http://localhost:8082}
    connect-timeout: PT2S
    read-timeout: PT6S
  pipeline:
    consumer-concurrency: ${PIPELINE_CONSUMER_CONCURRENCY:3}
    delivery-delay:
      min-ms: 2000
      max-ms: 6000
    reconciliation:
      # Backstop for orders neither Kafka redelivery nor the in-memory
      # delivery scheduler will ever revisit on their own (e.g. a process
      # killed right after scheduling OUT_FOR_DELIVERY -> DELIVERED, which
      # only exists as an in-memory timer). stale-after-ms should stay well
      # above delivery-delay.max-ms so orders progressing normally are
      # never mistaken for stuck ones.
      stale-after-ms: 15000
      interval-ms: 10000

resilience4j:
  retry:
    instances:
      restaurant:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      courier:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  circuitbreaker:
    instances:
      restaurant:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      courier:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  bulkhead:
    instances:
      restaurant:
        max-concurrent-calls: 10
      courier:
        max-concurrent-calls: 10

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] [orderId=%X{orderId}] %logger{36} - %msg%n"
